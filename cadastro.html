<!DOCTYPE html>
  <html lang="PT-BR">
     <head>
       <style>
         .texto{
           color: black;
         }
         .campo{
           border: 1px solid white;
         }
         fieldset{
           border: 1px solid blue;
           background-color: #40E0D0;
         }
         legend{
           color: black;
         }
         .botao{
           background-color: #47A6CC;
           color: white;
         }
         body{
           background-color: #7FFFD4;
         }
       </style>
        <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCweRM1FLRA9rmhinBleiGNQm1T6tQYw2w",
  authDomain: "projeto3c-616ef.firebaseapp.com",
  projectId: "projeto3c-616ef",
  storageBucket: "projeto3c-616ef.firebasestorage.app",
  messagingSenderId: "19545240536",
  appId: "1:19545240536:web:87847be5853f467dbc38ad",
  measurementId: "G-WNWLEWZ3C1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById("formulario");
    const mensagem = document.getElementById("mensagem");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const nome = document.getElementById("nome").value;
      const cep = document.getElementById("cep").value;
      const cpf = document.getElementById("cpf").value;
      const data_nacimento = document.getElementById("data_nacimento").value;
      const email = document.getElementById("email").value;
      const foto = document.getElementById("foto").value;
      const idade = document.getElementById("idade").value;
      const rg = document.getElementById("rg").value;
      
      const telefone = document.getElementById("telefone").value;

      try {
        await addDoc(collection(db, "usuarios"), {
          nome,
          cep,
          cpf,
          data_nacimento,
          email,
          foto,
          idade,
          rg,
          senha,
          telefone
        });

        mensagem.textContent = "Usuário salvo com sucesso.";
        mensagem.style.color = "green";
        form.reset();
      } catch (error) {
        mensagem.textContent = "Erro ao salvar: " + error.message;
        mensagem.style.color = "red";
      }
    });
  </script>
     </head>
    <body>
      <form id="formulario">
      <fieldset>
          <legend>Cadastro de Usuarios</legend>
                    <p class="texto">NOME COMPLETO:</p> <input type="text" id="nome" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">CEP:</p> <input type="text" id="cep" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">CPF: </p><input type="text" id="cpf" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">DATA DE NASCIMENTO:</p> <input type="text" id="data de nacimento" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">EMAIL:</p> <input type="text" id="email" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">FOTO:</p> <input type="text" id="foto" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">IDADE: </p><input type="text" id="idade" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">RG:</p> <input type="text" id="rg" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">SENHA: </p><input type="text" id="senha" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" required><br>
                    <p class="texto">TELEFONE:</p><input type="text" id="telefone" class="campo" placeholder="Nome de usuario" minlength="10" maxlength="20" id="nome" class="nome" name="nome" requ ired><br> 
              <input type="submit" value="Cadastrar">
      </fieldset>
      </form>
  </body>
</html>
